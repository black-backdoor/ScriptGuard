<!DOCTYPE html>
<html>
<head>
    <title>Scan - ScriptGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="/assets/favicon.svg">

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css" type="text/css"/>
</head>
<body>
    <header>
        <div class="header">
            <div id="name">
                <a href="/">ScriptGuard</a>
            </div>
            <nav>
                <ul>
                    <li><a href="https://github.com/black-backdoor/ScriptGuard">GitHub</a></li>
                    <li><a href="/about/">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="input">
            <h1>Scan your userscript</h1>
            <section class="taps">
                <div class="tab" id="text">
                    <!-- CODE INPUT (TEXT)-->
                    <input type="radio" name="css-tabs" id="tab-1" class="tab-switch" checked>
                    <label for="tab-1" class="tab-label">Text</label>

                    <p>TEXT</p>
                    <div class="tab-content">
                        <h3>Paste your Code</h3>
                        <textarea id="text-input" placeholder="Paste your userscript here"></textarea>
                    </div>
                </div>
                <div class="tab" id="file-upload">
                    <!-- CODE INPUT (FILE)-->
                    <input type="radio" name="css-tabs" id="tab-2" class="tab-switch">
                    <label for="tab-2" class="tab-label">File</label>

                    <h3>File Upload</h3>
                    <div class="tab-content">
                        <h3>Select a File</h3>
                        <input type="file" id="file-input" accept=".user.js">
                    </div>
                </div>
            </section>
        </section>
        <section id="results">
            <section id="meta-data" class="wrapper">
                <div class="taps">
                    <div class="tap" id="meta-table">
                        <!-- META DATA (TABLE)-->
                        <input type="radio" name="tabs-metadata" id="tab-metadata-table" class="tab-switch" checked>
                        <label for="tab-metadata-table" class="tab-label">Meta Data Summery</label>

                        <h3>Meta Tags</h3>
                        <div class="tap-content">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Value</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Name</td>
                                        <td>ScriptGuard</td>
                                    </tr>
                                    <tr>
                                        <td>Version</td>
                                        <td>0.1.0</td>
                                    </tr>
                                    <tr>
                                        <td>Description</td>
                                        <td>ScriptGuard is a tool to scan userscripts for malicious code.</td>
                                    </tr>
                                    <tr>
                                        <td>Author</td>
                                        <td>black-backdoor</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="tap" id="meta-code">
                        <!-- META DATA (CODE) -->
                        <input type="radio" name="tabs-metadata" id="tab-metadata-raw" class="tab-switch">
                        <label for="tab-metadata-raw" class="tab-label">Code</label>
                        
                        <h3>Meta Header</h3>
                        <div class="tap-content">
                            <code id="meta-code-input" class="language-javascript"></code>
                        </div>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <a href="/" id="footer-logo">ScriptGuard</a>
    </footer>
</body>
</html>
